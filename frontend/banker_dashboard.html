<!DOCTYPE html>
<html>

<head>
<title>Banker Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.controls{
margin:20px;
text-align:center;
}

.controls button{
margin:5px;
}
</style>

</head>

<body>

<div class="topbar">
<h2>FinRisk - Banker Dashboard</h2>
</div>

<div class="container">

<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='banker_dashboard.html'">Dashboard</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>Borrower Applications</h1>

<!-- 🔥 CONTROLS -->
<div class="controls">
<button onclick="showAll()">Show All</button>
<button onclick="filterLowRisk()">Low Risk Only</button>
<button onclick="sortByScore()">Sort by Score</button>
</div>

<div class="loan-card">

<table border="1" width="100%" id="userTable">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Income</th>
<th>Expense</th>
<th>Risk Score</th>
<th>Status</th>
<th>Decision</th>
</tr>
</table>

</div>

</div>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let table = document.getElementById("userTable");

// 🎯 LOAD TABLE
function loadTable(data){

// clear old rows
table.innerHTML = `
<tr>
<th>Name</th>
<th>Phone</th>
<th>Income</th>
<th>Expense</th>
<th>Risk Score</th>
<th>Status</th>
<th>Decision</th>
</tr>
`;

data.forEach((u, index) => {

let color = "black";

if(u.score >= 75) color = "green";
else if(u.score >= 55) color = "orange";
else color = "red";

let row = table.insertRow();

row.innerHTML = `
<td>${u.name}</td>
<td>${u.phone}</td>
<td>₹${u.income || 0}</td>
<td>₹${u.expense || 0}</td>
<td style="color:${color}; font-weight:bold;">${u.score || 0}</td>
<td id="status-${index}">${u.status || "Pending"}</td>
<td>
<button onclick="approve(${index})">Approve</button>
<button onclick="reject(${index})">Reject</button>
</td>
`;

});

}

// ✅ INITIAL LOAD
loadTable(users);


// 🎯 FILTER LOW RISK
function filterLowRisk(){
let filtered = users.filter(u => u.score >= 75);
loadTable(filtered);
}

// 🎯 SHOW ALL
function showAll(){
loadTable(users);
}

// 🎯 SORT BY SCORE
function sortByScore(){
let sorted = [...users].sort((a,b) => b.score - a.score);
loadTable(sorted);
}


// ✅ APPROVE
function approve(index){
users[index].status = "Approved";
localStorage.setItem("users", JSON.stringify(users));
loadTable(users);
}

// ❌ REJECT
function reject(index){
users[index].status = "Rejected";
localStorage.setItem("users", JSON.stringify(users));
loadTable(users);
}

// 🚪 LOGOUT
function logout(){
window.location.href = "index.html";
}

</script>

</body>
</html>
