<!DOCTYPE html>
<html>

<head>

<title>Banker Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.controls{
margin:20px;
text-align:center;
}

.controls button{
margin:5px;
}

/* Popup */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.popup-content{
background:white;
padding:20px;
width:300px;
margin:100px auto;
border-radius:10px;
text-align:center;
}
</style>

</head>

<body>

<div class="topbar">
<h2>FinRisk - Banker Dashboard</h2>
</div>

<div class="container">

<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='banker_dashboard.html'">Dashboard</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>Borrower Applications</h1>

<div class="controls">
<button onclick="showAll()">Show All</button>
<button onclick="filterLowRisk()">Low Risk Only</button>
<button onclick="sortByScore()">Sort by Score</button>
</div>

<div class="loan-card">

<table border="1" width="100%" id="userTable">
<tr>
<th>Name</th>
<th>Age</th>
<th>Loan Amount</th>
<th>Existing EMI</th>
<th>Risk Score</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

</div>

</div>
</div>

<!-- 🔴 REJECT REASON POPUP -->
<div id="rejectPopup" class="popup">
<div class="popup-content">
<h3>Reason for Rejection</h3>
<input type="text" id="rejectReason" placeholder="Enter reason"><br><br>
<button onclick="submitReject()">Submit</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

// 📥 GET APPLICATIONS FROM USER FORM
let applications = JSON.parse(localStorage.getItem("applications")) || [];

// 🔥 ADD DEFAULT VALUES (name + id)
applications = applications.map((app, index) => ({
id: app.id || index,
name: app.name || "User " + (index+1),
age: app.age,
loan: app.loan,
existingEmi: app.existingEmi || 0,
score: app.score,
status: app.status || "Pending",
reason: app.reason || ""
}));

localStorage.setItem("applications", JSON.stringify(applications));

let table = document.getElementById("userTable");
let selectedId = null;


// 🎯 LOAD TABLE
function loadTable(data){

table.innerHTML = `
<tr>
<th>Name</th>
<th>Age</th>
<th>Loan Amount</th>
<th>Existing EMI</th>
<th>Risk Score</th>
<th>Status</th>
<th>Action</th>
</tr>
`;

data.forEach((u) => {

let color = "black";

if(u.score >= 75) color = "green";
else if(u.score >= 55) color = "orange";
else color = "red";

let row = table.insertRow();

row.innerHTML = `
<td>${u.name}</td>
<td>${u.age || "-"}</td>
<td>₹${u.loan || 0}</td>
<td>₹${u.existingEmi}</td>
<td style="color:${color}; font-weight:bold;">${u.score}</td>
<td>${u.status}</td>
<td>
<button onclick="approve(${u.id})">Approve</button>
<button onclick="openReject(${u.id})">Reject</button>
</td>
`;

});

}

// INITIAL LOAD
loadTable(applications);


// ✅ APPROVE
function approve(id){

let apps = JSON.parse(localStorage.getItem("applications")) || [];

let user = apps.find(u => u.id == id);

if(user){
user.status = "Approved";
user.reason = "";
}

localStorage.setItem("applications", JSON.stringify(apps));
loadTable(apps);

}


// 🔴 OPEN REJECT POPUP
function openReject(id){
selectedId = id;
document.getElementById("rejectReason").value = "";
document.getElementById("rejectPopup").style.display = "block";
}


// 🔴 SUBMIT REJECT
function submitReject(){

let reason = document.getElementById("rejectReason").value;

let apps = JSON.parse(localStorage.getItem("applications")) || [];

let user = apps.find(u => u.id == selectedId);

if(user){
user.status = "Rejected";
user.reason = reason;
}

localStorage.setItem("applications", JSON.stringify(apps));

closePopup();
loadTable(apps);

}


// FILTER LOW RISK
function filterLowRisk(){
let filtered = applications.filter(u => u.score >= 75);
loadTable(filtered);
}

// SHOW ALL
function showAll(){
applications = JSON.parse(localStorage.getItem("applications")) || [];
loadTable(applications);
}

// SORT
function sortByScore(){
let sorted = [...applications].sort((a,b) => b.score - a.score);
loadTable(sorted);
}


// CLOSE POPUP
function closePopup(){
document.getElementById("rejectPopup").style.display = "none";
}



// LOGOUT
function logout(){
window.location.href = "index.html";
}

</script>

</body>

</html>
