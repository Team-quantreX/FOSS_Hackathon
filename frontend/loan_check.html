<!DOCTYPE html>
<html>
<head>
    <title>Loan Check</title>
</head>

<body>

<h2>Loan Eligibility Check</h2>

<input type="number" id="income" placeholder="Monthly Income"><br><br>
<input type="number" id="expense" placeholder="Monthly Expense"><br><br>
<input type="number" id="existingEmi" placeholder="Existing EMI"><br><br>

<select id="loanType">
    <option>Personal</option>
    <option>Home</option>
    <option>Education</option>
</select><br><br>

<label>Upload Alternative Credit Proof:</label><br>
<input type="file" id="altCredit"><br><br>

<h3>Expense Breakdown</h3>
<input type="number" id="food" placeholder="Food"><br>
<input type="number" id="rent" placeholder="Rent"><br>
<input type="number" id="travel" placeholder="Travel"><br>
<input type="number" id="others" placeholder="Others"><br><br>

<button onclick="calculateLoan()">Check Eligibility</button>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
