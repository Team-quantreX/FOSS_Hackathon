<table border="1" width="100%" id="userTable">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Income</th>
<th>Score</th>
<th>Decision</th>
</tr>
</table>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

let table = document.getElementById("userTable");

users.forEach(u => {

let row = table.insertRow();

row.innerHTML = `
<td>${u.name}</td>
<td>${u.phone}</td>
<td>₹${u.income}</td>
<td>${u.score}</td>
<td>
<button onclick="approve()">Approve</button>
<button onclick="reject()">Reject</button>
</td>
`;

});

function approve(){
alert("Loan Approved");
}

function reject(){
alert("Loan Rejected");
}

</script>
