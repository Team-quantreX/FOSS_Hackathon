<!DOCTYPE html>
<html>

<head>
<title>User Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="topbar">
<h2>FinRisk - Borrower Analytics</h2>
</div>

<div class="container">

<div class="sidebar">
<h2>FinRisk</h2>
<button onclick="location.href='dashboard.html'">Dashboard</button>
<button onclick="location.href='loan_check.html'">Loan Eligibility</button>
<button>Logout</button>
</div>

<div class="main">

<h1>User Financial Dashboard</h1>

<div class="profile-card">
<h3>User Profile</h3>
<p>Name : <span id="userName"></span></p>
<p>Status : Active</p>
</div>

<div class="loan-card">
<h2>Risk Analysis</h2>
<p>Risk Score : <span id="riskScore">-</span></p>
<p>Risk Level : <span id="riskLevel">-</span></p>

<h2>Financial Summary</h2>
<p>Income: <span id="incomeDisplay">-</span></p>
<p>Expenses: <span id="expenseDisplay">-</span></p>

<button onclick="openFinancePopup()">Change Expense Distribution</button>
</div>

<div class="loan-card">
<h3>AI Suggestions</h3>
<p id="advice">-</p>
</div>

<div class="charts">
<canvas id="expenseChart"></canvas>
<canvas id="incomeChart"></canvas>
</div>

</div>
</div>

<!-- POPUP -->
<div id="financePopup" class="popup">
<div class="popup-content">

<h2>Enter Financial Details</h2>

Income<br>
<input type="number" id="income"><br><br>

Transport<br>
<input type="number" id="transport"><br><br>

Education<br>
<input type="number" id="education"><br><br>

Food<br>
<input type="number" id="food"><br><br>

Utilities<br>
<input type="number" id="utilities"><br><br>

Other<br>
<input type="number" id="other"><br><br>

<div id="extraExpenses"></div>

<button onclick="addExpense()">Add Other Expense</button><br><br>

<button onclick="saveFinance()">Save</button>

</div>
</div>

<script>

// username
document.getElementById("userName").innerText =
localStorage.getItem("userName");

// show popup only once
window.onload = function(){
if(localStorage.getItem("financeFilled") !== "yes"){
document.getElementById("financePopup").style.display="block";
}
loadData();
}

// open popup
function openFinancePopup(){
document.getElementById("financePopup").style.display="block";
}

// add extra expense
function addExpense(){
let div = document.createElement("div");
div.innerHTML = `
Extra Expense<br>
<input type="number" class="extra"><br><br>
`;
document.getElementById("extraExpenses").appendChild(div);
}

// save data
function saveFinance(){

let income = Number(document.getElementById("income").value);
let transport = Number(document.getElementById("transport").value);
let education = Number(document.getElementById("education").value);
let food = Number(document.getElementById("food").value);
let utilities = Number(document.getElementById("utilities").value);
let other = Number(document.getElementById("other").value);

// extra expenses
let extra = document.getElementsByClassName("extra");
let extraTotal = 0;

for(let i=0;i<extra.length;i++){
extraTotal += Number(extra[i].value);
}

let totalExpense = transport + education + food + utilities + other + extraTotal;

let savings = income - totalExpense;
let ratio = savings / income;

let score;

if(ratio > 0.4) score = 85;
else if(ratio > 0.25) score = 70;
else if(ratio > 0.1) score = 55;
else score = 35;

// save
localStorage.setItem("income", income);
localStorage.setItem("expense", totalExpense);
localStorage.setItem("score", score);
localStorage.setItem("financeFilled", "yes");

// close popup
document.getElementById("financePopup").style.display="none";

loadData();
}

// load data
function loadData(){

let income = localStorage.getItem("income");
let expense = localStorage.getItem("expense");
let score = localStorage.getItem("score");

if(!income) return;

document.getElementById("incomeDisplay").innerText = "₹"+income;
document.getElementById("expenseDisplay").innerText = "₹"+expense;
document.getElementById("riskScore").innerText = score;

// level
let level;

if(score >= 75) level = "Low Risk";
else if(score >= 55) level = "Medium Risk";
else level = "High Risk";

document.getElementById("riskLevel").innerText = level;

// AI suggestion
if(score < 60){
document.getElementById("advice").innerText =
"Reduce expenses to improve score";
}
else{
document.getElementById("advice").innerText =
"You are financially stable";
}

// charts
createCharts(income, expense);
}

// charts
function createCharts(income, expense){

new Chart(document.getElementById("expenseChart"),{
type:'pie',
data:{
labels:["Expenses"],
datasets:[{
data:[expense]
}]
}
});

new Chart(document.getElementById("incomeChart"),{
type:'bar',
data:{
labels:["Income","Expenses"],
datasets:[{
data:[income,expense],
backgroundColor:["#4CAF50","#FF5252"]
}]
}
});
}

</script>

</body>
</html>
